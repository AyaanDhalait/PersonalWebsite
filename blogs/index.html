<section class="hero">
    <div class="hero-content">

          ` <a href="/">Home</a>
        </div>

</section>

<section class="exp">
    <h1>Blogs</h1>

    <div class="timeline" id="blog-list"></div>
</section>

<hr width="400px">

<footer>
    &copy; Ayaan Dhalait. All Rights Reserved.
</footer>

<script>
const blogs = [
    {
        year: "2025",
        title: "Simulating the Solar System in Python",
        description: "How I Simulated the solar system in a 3 dimensional perspective in python",
        url: "/blogs/solar-system"
    }
];

const container = document.getElementById("blog-list");

blogs.forEach(blog => {
    const item = document.createElement("div");
    item.className = "item";

    item.innerHTML = `
        <div class="year">${blog.year}</div>
        <div class="content">
            <h3><a href="${blog.url}">${blog.title}</a></h3>
            <p>${blog.description}</p>
        </div>
    `;

    container.appendChild(item);
});
</script>
